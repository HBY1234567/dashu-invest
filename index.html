<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src https://qt.gtimg.cn https://web.ifzq.gtimg.cn https://api.jsonbin.io;">
<title>大数投资</title>
<script>if(location.protocol==='http:'){location.replace('https:'+location.href.slice(5));}</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding-bottom:64px}
body{padding-bottom:calc(80px + env(safe-area-inset-bottom,0))}
input,button{font-family:inherit}
.header{background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%);padding:18px 16px 14px;border-bottom:1px solid #1e293b;position:relative}
.header h1{font-size:21px;font-weight:700;color:#fff}
.header .sub{font-size:12px;color:#64748b;margin-top:4px}
.content{padding:16px}
/* 搜索框 */
.search-wrap{display:flex;gap:8px;margin-bottom:16px}
.search-wrap input{flex:1;padding:13px 14px;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#e2e8f0;font-size:15px;outline:none}
.search-wrap input:focus{border-color:#60a5fa}
.search-wrap input::placeholder{color:#475569}
.search-btn{padding:13px 18px;background:#3b82f6;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
.search-btn:active{opacity:.85}
.search-suggestions{background:#1e293b;border:1px solid #334155;border-radius:10px;margin-top:-6px;margin-bottom:12px;overflow:hidden;display:none}
.search-suggestions.show{display:block}
.suggestion-item{padding:11px 14px;border-bottom:1px solid #0f172a;cursor:pointer;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.suggestion-item:last-child{border-bottom:none}
.suggestion-item:hover,.suggestion-item:active{background:#263348}
.suggestion-name{font-weight:600;color:#fff}
.suggestion-code{font-size:12px;color:#64748b}
/* 行业推荐 */
.industry-section{margin-bottom:20px}
.industry-title{font-size:13px;color:#64748b;margin-bottom:8px;padding-left:2px}
.industry-stocks{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.industry-stocks::-webkit-scrollbar{display:none}
.ind-card{flex-shrink:0;min-width:120px;background:#1e293b;border:1px solid #334155;border-radius:12px;padding:12px 10px;cursor:pointer;text-align:center;transition:all .15s}
.ind-card:active{background:#263348;border-color:#60a5fa}
.ind-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px;white-space:nowrap}
.ind-code{font-size:11px;color:#64748b;margin-bottom:6px}
.ind-price{font-size:15px;font-weight:700;color:#fff}
.ind-signal{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-top:4px;display:inline-block}
/* 搜索结果 */
.card-list{background:#1e293b;border:1px solid #334155;border-radius:14px;overflow:hidden}
.stock-item{padding:13px 14px;border-bottom:1px solid #0f172a;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.stock-item:last-child{border-bottom:none}
.stock-item:hover,.stock-item:active{background:#263348}
.stock-item .name{font-size:15px;font-weight:600;color:#fff}
.stock-item .code{font-size:12px;color:#64748b;margin-top:2px}
.stock-item .arrow{color:#64748b;font-size:20px}
/* 返回按钮 */
.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:#60a5fa;cursor:pointer;margin-bottom:12px;background:none;border:none;padding:0}
.back-btn:active{opacity:.7}
/* 详情 */
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.detail-name{font-size:22px;font-weight:700;color:#fff}
.detail-code{font-size:13px;color:#64748b;margin-top:2px}
.detail-price{font-size:28px;font-weight:700;color:#fff;text-align:right}
.detail-meta{font-size:12px;color:#64748b;margin-top:2px;text-align:right}
.signal-banner{text-align:center;padding:16px;border-radius:14px;border:2px solid;margin-bottom:14px;font-size:17px;font-weight:700}
.signal-banner.buy{background:#052e1644;border-color:#22c55e;color:#22c55e}
.signal-banner.hold{background:#78350f44;border-color:#f59e0b;color:#f59e0b}
.signal-banner.sell{background:#450a0a44;border-color:#ef4444;color:#ef4444}
.signal-banner.empty{background:#1e293b;border-color:#475569;color:#94a3b8}
.signal-banner .signal-label{font-size:22px;margin-bottom:4px}
.signal-banner .signal-sub{font-size:12px;font-weight:400;opacity:.8}
.signal-banner .signal-detail{font-size:11px;font-weight:400;opacity:.65;margin-top:6px;padding-top:6px;border-top:1px dashed currentColor;line-height:1.6}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.metric{background:#0f172a;border-radius:10px;padding:12px 10px;text-align:center}
.metric-label{font-size:11px;color:#64748b;margin-bottom:4px}
.metric-value{font-size:24px;font-weight:700;margin-bottom:2px}
.metric-note{font-size:10px}
.metric-ok{color:#22c55e}.metric-fail{color:#ef4444}.metric-neutral{color:#94a3b8}
.double-low{background:linear-gradient(135deg,#064e3b,#065f46);border:1px solid #22c55e;color:#6ee7b7;padding:8px 12px;border-radius:10px;font-size:13px;font-weight:700;text-align:center;margin-bottom:14px}
.double-low.no{background:#1e293b;border:1px solid #334155;color:#64748b}
/* 52周 */
.week52{background:#0f172a;border-radius:10px;padding:12px 14px;margin-bottom:14px}
.week52-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.week52-title{font-size:13px;color:#64748b}
.week52-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600;color:#fff}
.week52-bar{background:#1e293b;border-radius:6px;height:12px;position:relative;overflow:hidden;margin-bottom:4px}
.week52-fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;transition:width .3s}
.week52-labels{display:flex;justify-content:space-between;font-size:10px;color:#475569;margin-top:4px}
.week52-range{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-top:2px}
.add-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;position:relative;z-index:99;margin-bottom:20px;box-shadow:0 4px 12px rgba(59,130,246,0.4)}
.add-btn:active{opacity:.85}
/* 组合分析 */
.summary-card{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid #334155;border-radius:14px;padding:16px;margin-bottom:14px}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #16202e}
.summary-row:last-child{border-bottom:none}
.summary-label{font-size:13px;color:#94a3b8}
.summary-value{font-size:16px;font-weight:700;color:#fff}
.summary-value.gain{color:#ef4444}
.summary-value.loss{color:#22c55e}
.warn-banner{background:#450a0a44;border:1px solid #ef4444;color:#fca5a5;padding:10px 12px;border-radius:10px;font-size:13px;margin-bottom:14px}
.ind-breakdown{margin-bottom:14px}
.ind-breakdown .industry-title{margin-bottom:10px}
.ind-bar-row{margin-bottom:10px;cursor:pointer;padding:6px 8px;border-radius:8px;transition:background .15s}
.ind-bar-row:hover{background:#1e293b}
.ind-bar-row.active{background:rgba(59,130,246,.18);outline:1px solid #3b82f6}
.ind-filter-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(59,130,246,.12);border:1px solid #3b82f6;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#bfdbfe}
.ind-filter-bar button{background:#1e40af;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.sig-dist{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.sig-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:12px;cursor:pointer;transition:opacity .15s}
.sig-badge:hover{opacity:.8}
.sig-badge.buy{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.sig-badge.hold{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.sig-badge.sell{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.sig-filter-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(245,158,11,.12);border:1px solid #f59e0b;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#fde68a}
.sig-filter-bar button{background:#b45309;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.ind-bar-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.ind-bar-name{color:#e2e8f0;font-weight:600}
.ind-bar-pct{color:#94a3b8}
.ind-bar-track{background:#1e293b;border-radius:6px;height:10px;overflow:hidden}
.ind-bar-fill{height:100%;border-radius:6px;transition:width .3s}
.ind-bar-fill.over{background:#ef4444}
.ind-bar-fill.ok{background:#3b82f6}
/* 实践表 */
.practice-empty{text-align:center;padding:50px 20px;color:#475569}
.practice-empty .icon{font-size:44px;margin-bottom:12px}
.practice-item{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:10px}
.practice-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.practice-name{font-size:16px;font-weight:700;color:#fff}
.practice-code{font-size:12px;color:#64748b;margin-top:2px}
.practice-delete{background:none;border:none;color:#475569;cursor:pointer;font-size:18px;padding:0;line-height:1}
.practice-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.practice-grid-item{background:#0f172a;border-radius:8px;padding:8px 6px;text-align:center}
.practice-grid-label{font-size:10px;color:#64748b}
.practice-grid-value{font-size:14px;font-weight:700;color:#e2e8f0;margin-top:2px}
.practice-gain{text-align:center;font-size:14px;font-weight:600;margin-bottom:8px}
.practice-tag{font-size:11px;background:#0f172a;color:#64748b;padding:2px 8px;border-radius:6px;margin-right:6px;margin-bottom:4px;display:inline-block}
.practice-signal{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:700;text-align:center;margin-top:8px}
.practice-advice{padding:8px 10px;border-radius:8px;margin-top:8px}
/* 云同步 */
.cloud-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#e2e8f0;padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.cloud-btn:active{background:rgba(96,165,250,0.25);border-color:#60a5fa}
.cloud-btn .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#475569}
.cloud-btn .dot.ok{background:#22c55e}
.cloud-btn .dot.err{background:#ef4444}
.cloud-btn .dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.cloud-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:flex-end;justify-content:center}
.cloud-modal.show{display:flex}
.cloud-modal-content{background:#1e293b;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;border-top:1px solid #334155}
.cloud-modal-content h3{color:#fff;font-size:17px;margin-bottom:6px}
.cloud-modal-content .sub{color:#64748b;font-size:12px;margin-bottom:16px}
.cloud-row{margin-bottom:14px}
.cloud-row label{display:block;color:#94a3b8;font-size:12px;margin-bottom:5px}
.cloud-row input,.cloud-row textarea{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;font-family:inherit}
.cloud-row input:focus,.cloud-row textarea:focus{border-color:#60a5fa}
.cloud-row textarea{resize:vertical;min-height:60px}
.cloud-status-box{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px}
.cloud-status-box .row{display:flex;justify-content:space-between;padding:3px 0}
.cloud-status-box .label{color:#64748b}
.cloud-status-box .val{color:#e2e8f0}
.cloud-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.cloud-actions button{flex:1;min-width:80px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.cloud-actions .btn-primary{background:#3b82f6;color:#fff}
.cloud-actions .btn-secondary{background:#475569;color:#fff}
.cloud-actions .btn-danger{background:#7f1d1d;color:#fecaca}
.cloud-actions .btn-primary:disabled,.cloud-actions .btn-secondary:disabled,.cloud-actions .btn-danger:disabled{opacity:.5;cursor:not-allowed}
.cloud-msg{padding:8px 10px;border-radius:6px;margin-top:10px;font-size:12px;line-height:1.5;display:none}
.cloud-msg.show{display:block}
.cloud-msg.ok{background:rgba(34,197,94,0.15);color:#86efac;border:1px solid rgba(34,197,94,0.3)}
.cloud-msg.err{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.3)}
.cloud-msg.info{background:rgba(96,165,250,0.15);color:#93c5fd;border:1px solid rgba(96,165,250,0.3)}
.cloud-help{background:#0f172a;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:11px;color:#94a3b8;line-height:1.6}
.cloud-help a{color:#60a5fa;text-decoration:none}
.cloud-help ol{margin:6px 0 0 16px;padding:0}
.cloud-close{position:absolute;right:14px;top:14px;background:none;border:none;color:#64748b;font-size:22px;cursor:pointer;padding:4px 8px}
.cloud-modal-content{position:relative}
.advice-head{font-size:13px;font-weight:700;color:#e2e8f0}
.advice-detail{font-size:11px;color:#94a3b8;margin-top:3px;line-height:1.4}
/* 市场温度 */
.thermo-card{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid #334155;border-radius:14px;padding:20px;margin-bottom:16px;text-align:center}
.thermo-value{font-size:40px;font-weight:800;margin:6px 0}
.thermo-scale{height:14px;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);border-radius:7px;position:relative;margin:14px 0 6px}
.thermo-marker{position:absolute;top:-5px;width:4px;height:24px;background:#fff;border-radius:2px;transform:translateX(-50%)}
.thermo-advice{font-size:15px;font-weight:700;margin-top:10px}
.thermo-note{font-size:12px;color:#64748b;margin-top:8px;line-height:1.5}
.heatmap{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.heat-cell{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 8px;text-align:center}
.heat-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.heat-chg{font-size:14px;font-weight:700;margin-top:4px}
.heat-pos{font-size:11px;color:#64748b;margin-top:2px}
/* 弹窗 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:flex-end}
.modal{background:#1e293b;border-radius:16px 16px 0 0;padding:24px 24px calc(24px + env(safe-area-inset-bottom,20px));width:100%;max-height:85vh;overflow-y:auto;margin-bottom:0}
.modal-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-label{font-size:13px;color:#94a3b8;margin-bottom:6px;display:block}
.modal-input{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none}
.modal-input:focus{border-color:#60a5fa}
.modal-input:disabled{color:#64748b;background:#162030}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-cancel{flex:1;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#94a3b8;font-size:15px;cursor:pointer}
.modal-confirm{flex:2;padding:12px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.footer{text-align:center;padding:12px;font-size:11px;color:#475569}
/* 模拟炒股账户卡片 */
.account-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:12px}
.account-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.account-label{font-size:13px;color:#94a3b8}
.account-value{font-size:14px;font-weight:700;color:#e2e8f0}
.account-value.gain{color:#ef4444}
.account-value.loss{color:#22c55e}
/* 持仓列表 */
.holding-list{margin-top:12px}
/* 操作按钮 */
.holding-actions{display:flex;gap:8px;margin-top:10px}
.action-btn{flex:1;padding:10px 0;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;text-align:center}
.buy-btn{background:#22c55e;color:#fff}
.sell-btn{background:#ef4444;color:#fff}
/* 交易信号 */
.trade-signal-row{margin-top:8px}
.trade-sig{display:block;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:4px}
.trade-sig.add{background:rgba(34,197,94,.15);color:#4ade80;border-left:3px solid #22c55e}
.trade-sig.stop{background:rgba(239,68,68,.15);color:#f87171;border-left:3px solid #ef4444}
.trade-sig.sell-half{background:rgba(245,158,11,.15);color:#fbbf24;border-left:3px solid #f59e0b}
.trade-sig.sell-clear{background:rgba(239,68,68,.15);color:#f87171;border-left:3px solid #ef4444}
/* 股息标签 */
.div-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px}
.div-tag.good{background:rgba(34,197,94,.15);color:#4ade80}
.div-tag.normal{background:rgba(234,179,8,.15);color:#fbbf24}
.div-tag.low{background:#0f172a;color:#64748b}
/* 卖出选项 */
.sell-opt{background:#1e293b;border:2px solid #334155;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.sell-opt:hover{border-color:#60a5fa}
.sell-opt-title{font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:4px}
.empty-hint{text-align:center;padding:40px 20px;color:#475569;font-size:14px}
/* 首页指数卡 + 组合摘要 */
.home-index{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.home-idx-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:10px 12px;min-height:78px}
.home-idx-name{font-size:12px;color:#94a3b8}
.home-idx-price{font-size:18px;font-weight:700;color:#fff;margin-top:2px}
.home-idx-chg{font-size:11px;font-weight:600;margin-top:2px}
.home-idx-us{font-size:9px;color:#64748b;margin-top:1px}
.home-portfolio{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:14px}
.home-pf-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.home-pf-row .l{font-size:13px;color:#94a3b8}
.home-pf-row .v{font-size:15px;font-weight:700;color:#fff}
.home-pf-row .v.gain{color:#ef4444}
.home-pf-row .v.loss{color:#22c55e}
.home-action{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.home-action .ic{font-size:22px}
.home-action .txt{font-size:13px;color:#e2e8f0;line-height:1.4}
.home-action.empty{opacity:.6}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:inline-block;width:14px;height:14px;border:2px solid #60a5fa;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:4px}
/* 底部返回主页 */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex;z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,0.3);padding-bottom:env(safe-area-inset-bottom,0)}

function calcCost(shares, price) {
  var cost = shares * price;
  var commission = Math.max(cost * COMMISSION_RATE, 5);
  return cost + commission;
}

function calcSellProceed(shares, price) {
  var proceed = shares * price;
  var commission = Math.max(proceed * COMMISSION_RATE, 5);
  var stamp = proceed * STAMP_TAX_RATE;
  return proceed - commission - stamp;
}

    return h.code === code && h.action === 'buy' && h.date === today;

  if (pos > 50) return 'half';

// 腾讯K线拉取并计算近250日高低（52周）—— 使用 ifzq.gtimg.cn 走腾讯走道，CORS*
async function fetchWeek52FromEM(code){
  var secid=String(code);
  if(/^\d{6}$/.test(secid))secid=secid.startsWith('6')?'sh'+secid:'sz'+secid;
  // qfq=前复权；day=日K；,,,320=空<end_date>, <count>= 320个交易日（>52周）
  var url='https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param='+secid+',day,,,320,qfq';
  try{
    var resp=await fetch(url,{headers:{'Referer':'https://gu.qq.com/'}});
    if(!resp.ok)return null;
    var j=await resp.json();
    var codeData=j.data&&j.data[secid];
    if(!codeData)return null;
    // 优先 qfqday（前复权）；如果仅 day 可用 day
    var lines=codeData.qfqday||codeData.day;
    if(!lines||lines.length===0)return null;
    // 取最近260个交易日
    var last=lines.slice(-260);
    var high=0,low=Number.MAX_VALUE;
    last.forEach(function(arr){
      var h=parseFloat(arr[3]);var l=parseFloat(arr[4]);
      if(!isNaN(h)&&h>high)high=h;
      if(!isNaN(l)&&l<low)low=l;
    });
    if(high<=0||low>=Number.MAX_VALUE||high<=low)return null;
    return {high52:high,low52:low};
  }catch(e){return null;}
}

}

async function fetchStockDetail(code){
  var secid=code;
  if(/^\d{6}$/.test(code))secid=code.startsWith('6')?'sh'+code:'sz'+code;
  var resp=await fetch('https://qt.gtimg.cn/q='+secid,{headers:{'Referer':'https://gu.qq.com'}});
  if(!resp.ok)return{error:'网络请求失败'};
  var buf=await resp.arrayBuffer();
  var bodyStr=GBK_DECODER.decode(buf);
  var match=bodyStr.match(/="([^"]+)"/);
  if(!match)return{error:'股票未找到'};
  var f=match[1].split('~');
  if(!f[3])return{error:'数据解析失败'};
  var price=parseFloat(f[3])||0;
  var pe=parseFloat(f[39])||null;
  var pb=parseFloat(f[43])||null;
  var rawCode=(code||'').replace(/^(sh|sz|bj)/i,'');
  var isExcludedBoard=/^(688|300|200|900|8)/.test(rawCode);
  var isETFlike=/^(51|15|56|58|59)/.test(rawCode);
  // 指数涨跌用 f[32]（涨跌幅%），个股涨跌用 f[31]
  var isIndex=/^(sh000001|sz399001)$/i.test(code);
  var chg=parseFloat(isIndex?f[32]:f[31])||null; // 涨跌幅%
  var prevClose=null; // 昨收价（由现价反推：现价/(1+涨跌幅/100)）
  if(price&&chg!=null)prevClose=Math.round((price/(1+chg/100))*1000)/1000;
  // 52周高低改用东方财富K线（腾讯字段含义不可靠）
  var high52=null,low52=null;
  var pureCode=rawCode;
  if(WEEK52_CACHE[pureCode]&&Date.now()-WEEK52_CACHE[pureCode].t<60*1000&&WEEK52_CACHE[pureCode].high52!=null){ // 1分钟刷新一次
    high52=WEEK52_CACHE[pureCode].high52;
    low52=WEEK52_CACHE[pureCode].low52;
  }else{
    var em=await fetchWeek52FromEM(pureCode);
    if(em){high52=em.high52;low52=em.low52;WEEK52_CACHE[pureCode]={high52:high52,low52:low52,t:Date.now()};saveWeek52Cache();}
  }
  var week52Pos=null;
  if(high52&&low52&&high52>low52&&price){
    week52Pos=Math.round(((price-low52)/(high52-low52))*1000)/10;
  }
  var roe=null;
  if(pe&&pb&&pe>0)roe=Math.round((pb/pe)*1000)/10;
  var stockEntry=STOCKS.find(function(s){return s.code===code;});
  var industry=stockEntry?stockEntry.industry:'';
  return{
    code:code,name:f[1]||code,price:price,industry:industry,

// 美股指数数据获取
async function fetchUSIndex(code){
  // 腾讯行情API美股指数secid映射
  var usMap={
    'DJI':'usDJI',  // 道琼斯
    'SPX':'usINX'   // 标普500
  };
  var secid=usMap[code]||('us'+code);
  try{
    var resp=await fetch('https://qt.gtimg.cn/q='+secid,{headers:{'Referer':'https://gu.qq.com'}});
    if(!resp.ok)return{error:'美股数据请求失败'};
    var buf=await resp.arrayBuffer();
    var bodyStr=GBK_DECODER.decode(buf);
    var match=bodyStr.match(/="([^"]+)"/);
    if(!match)return{error:'美股指数未找到'};
    var f=match[1].split('~');
    if(!f[3])return{error:'美股数据解析失败'};
    var price=parseFloat(f[3])||0;
    var chg=parseFloat(f[32])||null;
    var name=f[1]||code;
    return{code:code,name:name,price:price,chg:chg};
  }catch(e){
    return{error:'美股数据获取异常'};
  }
}

function fuzzyMatch(q){
  var ql=q.toLowerCase().trim();if(!ql)return[];
  var results=[];
  for(var i=0;i<STOCKS.length;i++){
    var s=STOCKS[i];var name=s.name.toLowerCase();var code=s.code.toLowerCase().replace(/^(sh|sz|bj)/,'');
    if(code===ql||s.code.toLowerCase()===ql){results.push(Object.assign({},s,{'_score':100}));continue;}
    if(name.startsWith(ql)){results.push(Object.assign({},s,{'_score':80}));continue;}
    if(name.includes(ql)){results.push(Object.assign({},s,{'_score':60}));continue;}
  }
  results.sort(function(a,b){return b._score-a._score;});
  return results.slice(0,15).map(function(x){var r={};for(var k in x)if(k!=='_score')r[k]=x[k];return r;});
}

async function searchSmartbox(kw){
  try{
    var url='https://smartbox.gtimg.cn/s3/?t=all&q='+encodeURIComponent(kw)+'&fmt=json';
    var resp=await fetch(url,{headers:{'Referer':'https://gu.qq.com'}});
    if(!resp.ok)return [];
    var txt=await resp.text();
    var m=txt.match(/v_hint\s*=\s*"([^"]*)"/);
    if(!m)return [];
    var parts=m[1].split(',');
    var out=[];
    for(var i=1;i<parts.length;i++){
      if(/^(sh|sz|bj)/.test(parts[i])){
        var code=parts[i];var name=parts[i+1]||code;var c=code.replace(/^(sh|sz|bj)/,'');
        if(/^(688|300|200|900|8)/.test(c)){i++;continue;}
        if(/^(51|15|56|58|59)/.test(c)){i++;continue;}
        out.push({code:code,name:name,industry:''});i++;
      }
    }
    return out.slice(0,15);
  }catch(e){return [];}
}

function indDlScore(d){
  if(d==null||d.pe==null||d.pb==null||d.pe<=0||d.pb<=0)return null;
  return d.pe/PE_THRESHOLD + d.pb/PB_THRESHOLD;
}
function isDl(d){var s=indDlScore(d);return s!=null&&s<=2;}

function pickPerIndustry(rows,f){
  var byInd={};
  rows.forEach(function(d){
    var ind=d.industry||'其他';
    if(!byInd[ind])byInd[ind]=[];
    byInd[ind].push(d);
  });
  var result=[];
  var indKeys=Object.keys(byInd).sort();
  indKeys.forEach(function(ind){
    var stocks=byInd[ind];
    var peSorted=stocks.slice().sort(function(a,b){return (a.pe==null?1e9:a.pe)-(b.pe==null?1e9:b.pe);});
    var pbSorted=stocks.slice().sort(function(a,b){return (a.pb==null?1e9:a.pb)-(b.pb==null?1e9:b.pb);});
    var posSorted=stocks.slice().sort(function(a,b){return (a.week52Pos==null?1e9:a.week52Pos)-(b.week52Pos==null?1e9:b.week52Pos);});
    var selected=[];
    var i;
    for(i=0;i<Math.min(1,peSorted.length);i++){
      if(peSorted[i].pe!=null&&peSorted[i].pe>0&&selected.indexOf(peSorted[i])<0)selected.push(peSorted[i]);
    }
    for(i=0;i<Math.min(1,pbSorted.length);i++){
      if(pbSorted[i].pb!=null&&pbSorted[i].pb>0&&selected.indexOf(pbSorted[i])<0)selected.push(pbSorted[i]);
    }
    for(i=0;i<Math.min(1,posSorted.length);i++){
      if(posSorted[i].week52Pos!=null&&posSorted[i].week52Pos>=0&&selected.indexOf(posSorted[i])<0)selected.push(posSorted[i]);
    }
    // 不足 3 只时，用该行业剩余股票按 52周位置 补足（低位优先）
    if(selected.length<3){
      for(i=0;i<posSorted.length&&selected.length<3;i++){
        if(selected.indexOf(posSorted[i])<0&&!posSorted[i].isExcludedBoard)selected.push(posSorted[i]);
      }
    }
    if(selected.length===0&&stocks.length>0&&!stocks[0].isExcludedBoard)selected.push(stocks[0]);
    selected.forEach(function(st){result.push({industry:ind,stock:st});});
  });
  return result;
}

function renderPick(){
  var c=$('#content');if(c==null)return;
  if(state.pickLoading && Object.keys(state.pickLive).length===0){
    var cnt=STOCKS.filter(function(s){return s.industry!=='ETF';}).length;
    c.innerHTML='<div class="empty-hint"><span class="loading"></span> 正在拉取全市场行情（约 '+cnt+' 只）…</div>';
    return;
  }
  var f=state.pickFilter;
  var heldInds={};state.practice.forEach(function(p){if(p.industry)heldInds[p.industry]=1;});
  // Step 1: 可用数据
  var all=Object.keys(state.pickLive).map(function(k){return state.pickLive[k];}).filter(function(d){
    return d.price!=null&&d.pe!=null&&d.pb!=null&&d.pe>0&&d.pb>0 && !d.isExcludedBoard;
  });
  // Step 2: 按行业选股
  var picks=pickPerIndustry(all, f);
  // Step 3: 行业过滤器
  if(f.industry!=='ALL')picks=picks.filter(function(p){return p.industry===f.industry;});
  // Step 4: 可选硬过滤（默认很宽）
  if(f.peMax<40||f.pbMax<5){
    picks=picks.filter(function(p){
      var d=p.stock;
      if(d.pe!=null&&d.pe>f.peMax)return false;
      if(d.pb!=null&&d.pb>f.pbMax)return false;
      return true;
    });
  }
  // Step 5: 排序
  var s=state.pickSort;
  if(s==='pe'){
    picks.sort(function(a,b){return (a.stock.pe==null?1e9:a.stock.pe)-(b.stock.pe==null?1e9:b.stock.pe);});
  }else if(s==='pb'){
    picks.sort(function(a,b){return (a.stock.pb==null?1e9:a.stock.pb)-(b.stock.pb==null?1e9:b.stock.pb);});
  }else if(s==='pos'){
    picks.sort(function(a,b){return (a.stock.week52Pos==null?1e9:a.stock.week52Pos)-(b.stock.week52Pos==null?1e9:b.stock.week52Pos);});
  }else if(s==='score'){

async function submitAdd(){

  var s=state.selectedStock;var live=state.livePrices[s.code]||{};
  var list=loadPractice();

  var entry={code:s.code,name:s.name,industry:ind,buyPrice:buyPrice,shares:shares,

  if(idx>=0)list[idx]=entry;else list.push(entry);
  savePractice(list);state.practice=list;closeModal();render();
}
async function removeItem(code){
  var list=loadPractice().filter(function(p){return p.code!==code;});
  savePractice(list);state.practice=list;
  // 同时清仓（从模拟炒股移除）
  var holdIdx=tradingState.holdings.findIndex(function(h){return h.code===code;});
  if(holdIdx>=0){
    var h=tradingState.holdings[holdIdx];
    var live=state.livePrices[code]||{};
    var sellPrice=live.price||h.buyPrice||0;
    tradingState.balance+=h.shares*sellPrice;
    tradingState.holdings.splice(holdIdx,1);
    saveTradingState();
  }
  render();
}

<script>
(function(){
  var SALT='dashu'; // 盐值
  // 校验逻辑：密码 + 日期盐 的简单哈希
  function simpleHash(str){
    var h=0;for(var i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h=h&h;}
    return h.toString(16);
  }
  window.checkPwd=function(){
    var i=document.getElementById('pwd-input'),m=document.getElementById('pwd-msg'),b=document.getElementById('pwd-box');
    var input=i.value.trim();
    var today=new Date().toISOString().slice(0,10);
    var token=simpleHash(input+today+SALT);
    // 真实校验：密码+dashu盐的哈希对比
    var pwdHash=simpleHash('2026'+SALT);
    if(simpleHash(input+SALT)===pwdHash){
      sessionStorage.setItem('dashu_auth',token);
      document.body.classList.remove('locked');
      document.getElementById('pwd-overlay').style.display='none';
    }else{
      m.textContent='密码错误，请重试';b.classList.remove('shake');void b.offsetWidth;b.classList.add('shake');
    }
  };
  if(sessionStorage.getItem('dashu_auth')){document.body.classList.remove('locked');document.getElementById('pwd-overlay').style.display='none'}
})();
</script>

<script>
(function(){

  var BIN_ID='6a5e43a8da38895dfe76de82';
  var MASTER_KEY='$2a$10$SzE6JpftR8ggYJXl2CsVNu/Pvu1zsXWbtUcTpW8Zgh0GSh/MLLuye';
  var AUTO_SYNC_DELAY=6000;
  var _autoTimer=null;

  function getConfig(){
    try{var c=JSON.parse(localStorage.getItem(CLOUD_KEY)||'{}');return c;}catch(e){return {};}
  }
  function setConfig(c){localStorage.setItem(CLOUD_KEY,JSON.stringify(c));}

  function cloudMsg(el,msg,type){

  }

  function updateCloudUI(){
    var cfg=getConfig();
    var box=document.getElementById('cloud-status-box');
    var actDan=document.getElementById('cloud-actions-danger');
    var btnBackup=document.getElementById('cloud-btn-backup');
    var btnRestore=document.getElementById('cloud-btn-restore');
    var dot=document.getElementById('cloud-dot');
    var btnLabel=document.getElementById('cloud-btn-label');

    if(MASTER_KEY){
      box.style.display='block';
      actDan.style.display='flex';
      btnBackup.disabled=false;
      btnRestore.disabled=false;
      document.getElementById('cloud-bin-id').textContent=BIN_ID;

      document.getElementById('cloud-local-count').textContent=state.practice.length+' 只';
      document.getElementById('cloud-remote-count').textContent=cfg.lastData?(cfg.lastData.practice.length+' 只'):'—';
      if(cfg.lastSync){
        dot.className='dot ok';
        btnLabel.textContent='已同步';
      }else{
        dot.className='dot';
        btnLabel.textContent='未同步';
      }
    }
  }

  window.openCloudModal=function(){
    updateCloudUI();
    document.getElementById('cloud-modal').classList.add('show');
  };
  window.closeCloudModal=function(){
    document.getElementById('cloud-modal').classList.remove('show');
  };

  window.cloudSaveToken=function(){};

  function binHeaders(){
    return {'X-Master-Key':MASTER_KEY,'Content-Type':'application/json'};
  }

  function buildBackupData(){
    return {
      version:1,
      lastUpdated:new Date().toISOString(),
      practice:state.practice.map(function(p){
        return {code:p.code,name:p.name,industry:p.industry||'',buyPrice:p.buyPrice,shares:p.shares,peAtBuy:p.peAtBuy,pbAtBuy:p.pbAtBuy,week52PosAtBuy:p.week52PosAtBuy,addedAt:p.addedAt};
      })
    };
  }

  window.cloudDoBackup=function(){
    cloudMsg('cloud-msg','正在备份…','info');
    var dot=document.getElementById('cloud-dot');
    dot.className='dot syncing';
    document.getElementById('cloud-btn-backup').disabled=true;
    var data=buildBackupData();
    fetch('https://api.jsonbin.io/v3/b/'+BIN_ID,{
      method:'PUT',
      headers:binHeaders(),
      body:JSON.stringify(data)
    }).then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.json();
    }).then(function(json){
      var cfg=getConfig();
      cfg.lastSync=new Date().toISOString();
      cfg.lastData=data;
      setConfig(cfg);
      cloudMsg('cloud-msg','✅ 备份成功！','ok');
      updateCloudUI();
      document.getElementById('cloud-btn-backup').disabled=false;
    }).catch(function(e){
      cloudMsg('cloud-msg','❌ 备份失败：'+e.message,'err');
      document.getElementById('cloud-dot').className='dot err';
      document.getElementById('cloud-btn-backup').disabled=false;
    });
  };

  window.cloudDoRestore=function(){
    cloudMsg('cloud-msg','正在从云端恢复…','info');
    document.getElementById('cloud-btn-restore').disabled=true;

      }

  function scheduleAutoSync(){

  function cloudDoBackupSilent(){

    scheduleAutoSync();
  };

  setTimeout(updateCloudUI,500);
})();
</script>
