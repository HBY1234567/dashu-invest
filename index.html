function calcSignal(d){
  var pos=d.week52Pos;
  if(pos==null)return{label:'ж•°жҚ®дёҚи¶і',cls:'empty',icon:'вҡӘ',sub:'52е‘Ёж•°жҚ®зјәеӨұ'};
  var peOk=d.pe!=null&&d.pe>0&&d.pe<=PE_THRESHOLD;
  var pbOk=d.pb!=null&&d.pb>0&&d.pb<=PB_THRESHOLD;
  if(pos<30){
    var tag='';
    if(peOk&&pbOk)tag='еҸҢдҪҺ+дҪҺд»·';
    else if(peOk)tag='PEдҪҺ+дҪҺд»·';
    else if(pbOk)tag='PBдҪҺ+дҪҺд»·';
    else tag='д»·ж јдҪҺдҪҚ';
    return{label:'е»әи®®д№°е…Ҙ',cls:'buy',icon:'рҹҹў',sub:'52е‘ЁдҪҚзҪ®'+pos+'% В· '+tag};
  }
  if(pos>70)return{label:'е»әи®®еҚ–еҮә',cls:'sell',icon:'рҹ”ҙ',sub:'52е‘ЁдҪҚзҪ®'+pos+'% В· д»·ж јй«ҳдҪҚ'};
  return{label:'жҢҒжңү',cls:'hold',icon:'рҹҹЎ',sub:'52е‘ЁдҪҚзҪ®'+pos+'% В· еҗҲзҗҶеҢәй—ҙ'};
}
// и…ҫи®ҜиЎҢжғ… APIпјҲеҺҹз”ҹCORSпјҢжөҸи§ҲеҷЁзӣҙиҝһпјү
async function fetchStockDetail(code){
  var secid=code;
  if(/^\d{6}$/.test(code))secid=code.startsWith('6')?'sh'+code:'sz'+code;
  var resp=await fetch('https://qt.gtimg.cn/q='+secid,{headers:{'Referer':'https://gu.qq.com'}});
  if(!resp.ok)return{error:'зҪ‘з»ңиҜ·жұӮеӨұиҙҘ'};
  var buf=await resp.arrayBuffer();
  var bodyStr=GBK_DECODER.decode(buf);
  var match=bodyStr.match(/="([^"]+)"/);
  if(!match)return{error:'иӮЎзҘЁжңӘжүҫеҲ°'};
  var f=match[1].split('~');
  if(!f[3])return{error:'ж•°жҚ®и§ЈжһҗеӨұиҙҘ'};
  var price=parseFloat(f[3])||0;
  var pe=parseFloat(f[39])||null;
  var pb=parseFloat(f[43])||null;
  var high52=parseFloat(f[33])||null;
  var low52=parseFloat(f[34])||null;
  var chg=parseFloat(f[32])||null; // ж¶Ёи·Ңе№…%
  var week52Pos=null;
  if(high52&&low52&&high52>low52&&price){
    week52Pos=Math.round(((price-low52)/(high52-low52))*1000)/10;
  }
  // ROE дј°з®— = PB/PEпјҲжқғзӣҠжҠҘй…¬зҺҮ вүҲ еҮҖиө„дә§ж”¶зӣҠзҺҮпјү
  var roe=null;
  if(pe&&pb&&pe>0)roe=Math.round((pb/pe)*1000)/10;
  return{
    code:code,name:f[1]||code,price:price,
    pe:(pe!==null&&pe>0)?Math.round(pe*100)/100:null,
    pb:(pb!==null&&pb>0)?Math.round(pb*100)/100:null,
    high52:high52,low52:low52,week52Pos:week52Pos,chg:chg,roe:roe,
  };
}

}

function fuzzyMatch(q){
  var ql=q.toLowerCase().trim();if(!ql)return[];
  var results=[];
  for(var i=0;i<STOCKS.length;i++){
    var s=STOCKS[i];var name=s.name.toLowerCase();var code=s.code.toLowerCase().replace(/^(sh|sz|bj)/,'');
    if(code===ql||s.code.toLowerCase()===ql){results.push(Object.assign({},s,{'_score':100}));continue;}
    if(name.startsWith(ql)){results.push(Object.assign({},s,{'_score':80}));continue;}
    if(name.includes(ql)){results.push(Object.assign({},s,{'_score':60}));continue;}
  }
  results.sort(function(a,b){return b._score-a._score;});
  return results.slice(0,15).map(function(x){var r={};for(var k in x)if(k!=='_score')r[k]=x[k];return r;});
}

  if(state.pickLoading && Object.keys(state.pickLive).length===0){
    var cnt=STOCKS.filter(function(s){return s.industry!=='ETF';}).length;
    c.innerHTML='<div class="empty-hint"><span class="loading"></span> жӯЈеңЁжӢүеҸ–е…ЁеёӮеңәиЎҢжғ…пјҲзәҰ '+cnt+' еҸӘпјүвҖҰ</div>';
    return;
  }
  var f=state.pickFilter;
  var rows=Object.keys(state.pickLive).map(function(k){return state.pickLive[k];});
  rows=rows.filter(function(d){
    if(f.onlyDouble && !isDoubleLow(d))return false;
    if(d.pe!=null && f.peMax!=null && d.pe>f.peMax)return false;
    if(d.pb!=null && f.pbMax!=null && d.pb>f.pbMax)return false;
    if(d.week52Pos!=null && f.posMax!=null && d.week52Pos>f.posMax)return false;
    if(f.industry!=='ALL' && d.industry!==f.industry)return false;
    return true;
  });
  rows.sort(function(a,b){
    if(state.pickSort==='pe')return (a.pe==null?1e9:a.pe)-(b.pe==null?1e9:b.pe);
    if(state.pickSort==='pb')return (a.pb==null?1e9:a.pb)-(b.pb==null?1e9:b.pb);
    if(state.pickSort==='pos')return (a.week52Pos==null?1e9:a.week52Pos)-(b.week52Pos==null?1e9:b.week52Pos);
    var sa=doubleLowScore(a), sb=doubleLowScore(b);
    if(sa==null&&sb==null)return 0;
    if(sa==null)return 1;
    if(sb==null)return -1;
    return sa-sb;
  });
  var total=Object.keys(state.pickLive).length;
  var dlCount=rows.filter(function(d){return isDoubleLow(d);}).length;
  var industries=[];
  STOCKS.forEach(function(s){if(s.industry!=='ETF'&&industries.indexOf(s.industry)<0)industries.push(s.industry);});
  var indOpts='<option value="ALL">е…ЁйғЁиЎҢдёҡ</option>';
  industries.forEach(function(n){indOpts+='<option value="'+escAttr(n)+'" '+(f.industry===n?'selected':'')+'>'+escHtml(n)+'</option>';});
  var html='<div class="pick-filters">'+
    '<div class="pf-row">'+
      '<div class="pf-field"><label>иЎҢдёҡ</label><select id="pf-industry" onchange="pickSet(\'industry\',this.value)">'+indOpts+'</select></div>'+
      '<div class="pf-field"><label>д»…зңӢеҸҢдҪҺ(PEвүӨ'+PE_THRESHOLD+'&amp;PBвүӨ'+PB_THRESHOLD+')</label><select id="pf-only" onchange="pickSet(\'onlyDouble\',this.value===\'1\')">'+
        '<option value="1" '+(f.onlyDouble?'selected':'')+'>жҳҜ</option><option value="0" '+(!f.onlyDouble?'selected':'')+'>еҗҰ</option></select></div>'+
    '</div>'+
    '<div class="pf-row">'+
      '<div class="pf-field"><label>PE дёҠйҷҗ вүӨ</label><input id="pf-pe" type="number" step="1" value="'+escAttr(f.peMax)+'" onchange="pickSet(\'peMax\',parseFloat(this.value)||999)"></div>'+
      '<div class="pf-field"><label>PB дёҠйҷҗ вүӨ</label><input id="pf-pb" type="number" step="0.1" value="'+escAttr(f.pbMax)+'" onchange="pickSet(\'pbMax\',parseFloat(this.value)||999)"></div>'+
      '<div class="pf-field"><label>52е‘ЁдҪҚзҪ® вүӨ %</label><input id="pf-pos" type="number" step="5" value="'+escAttr(f.posMax)+'" onchange="pickSet(\'posMax\',parseFloat(this.value)||100)"></div>'+
    '</div>'+
  '</div>';
  html+='<div class="sort-bar">'+
    '<button class="sort-btn '+(state.pickSort==='score'?'active':'')+'" onclick="pickSort(\'score\')">рҹҢҹеҸҢдҪҺеҲҶж•°</button>'+
    '<button class="sort-btn '+(state.pickSort==='pe'?'active':'')+'" onclick="pickSort(\'pe\')">рҹ“үPE</button>'+
    '<button class="sort-btn '+(state.pickSort==='pb'?'active':'')+'" onclick="pickSort(\'pb\')">рҹ“үPB</button>'+
    '<button class="sort-btn '+(state.pickSort==='pos'?'active':'')+'" onclick="pickSort(\'pos\')">рҹ“ү52е‘ЁдҪҚзҪ®</button>'+
    '<button class="sort-btn" onclick="loadPickList()" style="margin-left:auto">рҹ”„еҲ·ж–°</button>'+
  '</div>';
  html+='<div class="pick-summary"><span>з¬ҰеҗҲжқЎд»¶ <b>'+rows.length+'</b> еҸӘ / е…ұ '+total+' еҸӘ</span><span class="badge-ok">еҸҢдҪҺиҫҫж Ү '+dlCount+' еҸӘ</span></div>';
  if(rows.length===0){
    html+='<div class="empty-hint">жІЎжңүз¬ҰеҗҲеҪ“еүҚзӯӣйҖүжқЎд»¶зҡ„иӮЎзҘЁпјҢиҜ•иҜ•ж”ҫе®Ҫ PE/PB дёҠйҷҗжҲ–е…ій—ӯ"д»…зңӢеҸҢдҪҺ"гҖӮ</div>';
  } else {
    for(var i=0;i<rows.length;i++){
      var d=rows[i];
      var sc=doubleLowScore(d);
      var sig=calcSignal(d);
      var dl=isDoubleLow(d);
      var scoreStr=sc!=null?sc.toFixed(2):'вҖ”';
      var scoreColor=dl?'#6ee7b7':(sc!=null&&sc<=3?'#f59e0b':'#94a3b8');
      var tagCls=sig.cls==='buy'?'buy':sig.cls==='sell'?'sell':'hold';
      html+='<div class="pick-card" onclick="viewStock({code:\''+escAttr(d.code)+'\',name:\''+escAttr(d.name)+'\'})">'+
        '<div class="pick-left">'+
          '<div class="pick-name">'+escHtml(d.name)+' <span style="font-size:11px;color:#64748b">'+escHtml((d.code||'').replace(/^(sh|sz|bj)/i,''))+'</span></div>'+
          '<div class="pick-meta">'+escHtml(d.industry||'')+' В· PE '+(d.pe!=null?d.pe.toFixed(2):'вҖ”')+' В· PB '+(d.pb!=null?d.pb.toFixed(2):'вҖ”')+' В· 52е‘Ё'+(d.week52Pos!=null?d.week52Pos+'%':'вҖ”')+'</div>'+
          '<div class="pick-tags">'+
            (dl?'<span class="pick-tag dl">вң…еҸҢдҪҺиҫҫж Ү</span>':'')+
            '<span class="pick-tag '+tagCls+'">'+sig.icon+' '+sig.label+'</span>'+
          '</div>'+
        '</div>'+
        '<div class="pick-right">'+
          '<div class="pick-score" style="color:'+scoreColor+'">'+scoreStr+'</div>'+
          '<div class="pick-sub">еҸҢдҪҺеҲҶж•°</div>'+
        '</div>'+
      '</div>';
    }
  }
  c.innerHTML=html;
}
// ---- еј№зӘ— ----
function openAddModal(){
  var s=state.selectedStock;if(!s)return;
  state.addForm={code:s.code,name:s.name,industry:s.industry,buyPrice:s.price||'',shares:'',divYld:''};
  renderModal();
}
function closeModal(){state.showAddModal=false;var el=$('.modal-overlay');if(el)el.remove();}
function renderModal(){
  var f=state.addForm;
  var html='<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">еҠ е…Ҙе®һи·өиЎЁ</div>'+
    '<div class="modal-field"><label class="modal-label">иӮЎзҘЁ</label><input class="modal-input" value="'+escAttr(f.name+' ('+f.code.replace(/^(sh|sz|bj)/i,'')+')')+'" disabled></div>'+
    '<div class="modal-field"><label class="modal-label">д№°е…Ҙд»·ж јпјҲе…ғпјү</label><input class="modal-input" type="number" step="0.01" placeholder="еЎ«е®һйҷ…д№°е…Ҙд»·" value="'+escAttr(f.buyPrice||'')+'" id="modal-buyPrice"></div>'+
    '<div class="modal-field"><label class="modal-label">д№°е…Ҙж•°йҮҸпјҲиӮЎпјү</label><input class="modal-input" type="number" step="100" placeholder="100зҡ„ж•ҙж•°еҖҚ" value="'+escAttr(f.shares||'')+'" id="modal-shares"></div>'+
    '<div class="modal-field"><label class="modal-label">иӮЎжҒҜзҺҮпјҲ%пјҢеҸҜйҖү В· з”ЁдәҺз»„еҗҲзҺ°йҮ‘жөҒеҲҶжһҗпјү</label><input class="modal-input" type="number" step="0.1" placeholder="еҰӮ 4.5" value="'+escAttr(f.divYld||'')+'" id="modal-divYld"></div>'+
    '<div class="modal-actions"><button class="modal-cancel" onclick="closeModal()">еҸ–ж¶Ҳ</button><button class="modal-confirm" onclick="submitAdd()">зЎ®и®Өж·»еҠ </button></div></div></div>';
  var existing=$('.modal-overlay');if(existing)existing.remove();
  document.body.insertAdjacentHTML('beforeend',html);
}
async function submitAdd(){
  var buyPrice=parseFloat($('#modal-buyPrice').value)||0;
  var shares=parseInt($('#modal-shares').value)||0;
  var divYld=parseFloat($('#modal-divYld').value)||null;
  if(!buyPrice||!shares){alert('иҜ·еЎ«еҶҷд№°е…Ҙд»·е’Ңж•°йҮҸ');return;}
  var s=state.selectedStock;var live=state.livePrices[s.code]||{};
  var list=loadPractice();
  var idx=list.findIndex(function(p){return p.code===s.code;});
  var entry={code:s.code,name:s.name,industry:s.industry,buyPrice:buyPrice,shares:shares,divYld:divYld,
    peAtBuy:live.pe??null,pbAtBuy:live.pb??null,week52PosAtBuy:live.week52Pos??null,addedAt:new Date().toISOString()};
  if(idx>=0)list[idx]=entry;else list.push(entry);
  savePractice(list);state.practice=list;closeModal();render();
}
async function removeItem(code){
  var list=loadPractice().filter(function(p){return p.code!==code;});
  savePractice(list);state.practice=list;render();
}
// ============================================================
// Init + е®ҡж—¶еҲ·ж–°
// ============================================================
function setLoadBar(pct,text){
  var fill=$('#loadbar-fill');var pctEl=$('#loadbar-pct');var wrap=$('#initial-loader');
  if(fill){fill.classList.remove('indeterminate');fill.style.width=pct+'%';}
  if(pctEl)pctEl.textContent=text||(pct+'%');
  if(wrap&&pct>=100)setTimeout(function(){wrap.style.display='none';},400);
}
function showInitError(err){
  var wrap=$('#initial-loader');if(!wrap)return;
  wrap.innerHTML='<div style="color:#ef4444;font-size:13px;line-height:1.5"><b>вҡ пёҸ еҲқе§ӢеҢ–еӨұиҙҘ</b><br><span style="color:#94a3b8">'+String(err).replace(/</g,'&lt;')+'</span><br><br><button class="search-btn" onclick="location.reload()">рҹ”„ йҮҚж–°еҠ иҪҪ</button></div>';
}
try{
  setLoadBar(10,'еҠ иҪҪиӮЎжұ вҖҰ');
  state.practice=loadPractice();
  setLoadBar(30,'еҠ иҪҪиӮЎжұ е®ҢжҲҗ');
  render();
  setLoadBar(60,'жёІжҹ“з•ҢйқўвҖҰ');
  setTimeout(function(){
    setLoadBar(100,'еҠ иҪҪиЎҢжғ…ж•°жҚ®вҖҰ');
    setTimeout(function(){var wrap=$('#initial-loader');if(wrap)wrap.style.display='none';},300);
  },200);
  refreshIndustryRecs().then(function(){
    var sec=$('#industry-recs');
    if(sec&&state.tab==='search'&&state.viewStack.length===0){
      sec.outerHTML=renderIndustrySection();
      var inp2=$('#search-input');
      if(inp2&&!inp2._bound){inp2._bound=true;inp2.addEventListener('input',function(e){state.query=e.target.value;handleSearchInput(state.query);});inp2.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSearch();}});}
    }
  }).catch(function(e){console.warn('иЎҢдёҡжҺЁиҚҗеҠ иҪҪеӨұиҙҘ',e);});
}catch(err){console.error('Init error:',err);showInitError(err.message||err);throw err;}
// иЎҢжғ…еҲ·ж–°
setInterval(function(){
  if(state.tab==='search'&&state.viewStack.length===0){
    refreshIndustryRecs().then(function(){
      if(state.tab==='search'&&state.viewStack.length===0){
        var sec=$('#industry-recs');if(sec)sec.outerHTML=renderIndustrySection();
      }
    });
  }
  if(state.tab==='market')fetchMarketTemp();
},60000);
setInterval(function(){if(state.tab==='portfolio'&&state.practice.length>0)refreshLivePrices();},30000);
setInterval(function(){if(state.tab==='pick'&&!state.pickLoading&&Object.keys(state.pickLive).length>0)loadPickList();},120000);
</script>
