<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大数投资</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
input,button{font-family:inherit}
.header{background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%);padding:20px 16px 16px;border-bottom:1px solid #1e293b}
.header h1{font-size:22px;font-weight:700;color:#fff}
.header .sub{font-size:12px;color:#64748b;margin-top:4px}
.tabs{display:flex;border-bottom:1px solid #1e293b;background:#1e293b}
.tab{flex:1;padding:14px 0;text-align:center;font-size:15px;color:#64748b;cursor:pointer;border:none;background:none;transition:all .2s;border-bottom:2px solid transparent}
.tab.active{color:#60a5fa;border-bottom-color:#60a5fa;font-weight:600}
.content{padding:16px}

/* 搜索框 */
.search-wrap{display:flex;gap:8px;margin-bottom:16px}
.search-wrap input{flex:1;padding:13px 14px;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#e2e8f0;font-size:15px;outline:none}
.search-wrap input:focus{border-color:#60a5fa}
.search-wrap input::placeholder{color:#475569}
.search-btn{padding:13px 18px;background:#3b82f6;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
.search-btn:active{opacity:.85}

/* 搜索建议下拉 */
.search-suggestions{background:#1e293b;border:1px solid #334155;border-radius:10px;margin-top:-6px;margin-bottom:12px;overflow:hidden;display:none}
.search-suggestions.show{display:block}
.suggestion-item{padding:11px 14px;border-bottom:1px solid #0f172a;cursor:pointer;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.suggestion-item:last-child{border-bottom:none}
.suggestion-item:hover,.suggestion-item:active{background:#263348}
.suggestion-name{font-weight:600;color:#fff}
.suggestion-code{font-size:12px;color:#64748b}

/* 行业推荐 */
.industry-section{margin-bottom:20px}
.industry-title{font-size:13px;color:#64748b;margin-bottom:8px;padding-left:2px}
.industry-stocks{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.industry-stocks::-webkit-scrollbar{display:none}
.ind-card{flex-shrink:0;min-width:120px;background:#1e293b;border:1px solid #334155;border-radius:12px;padding:12px 10px;cursor:pointer;text-align:center;transition:all .15s}
.ind-card:active{background:#263348;border-color:#60a5fa}
.ind-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px;white-space:nowrap}
.ind-code{font-size:11px;color:#64748b;margin-bottom:6px}
.ind-price{font-size:15px;font-weight:700;color:#fff}
.ind-signal{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-top:4px;display:inline-block}

/* 搜索结果列表 */
.card-list{background:#1e293b;border:1px solid #334155;border-radius:14px;overflow:hidden}
.stock-item{padding:13px 14px;border-bottom:1px solid #0f172a;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.stock-item:last-child{border-bottom:none}
.stock-item:hover,.stock-item:active{background:#263348}
.stock-item .name{font-size:15px;font-weight:600;color:#fff}
.stock-item .code{font-size:12px;color:#64748b;margin-top:2px}
.stock-item .arrow{color:#64748b;font-size:20px}

/* 详情页 */
.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:#60a5fa;cursor:pointer;margin-bottom:12px;background:none;border:none;padding:0}
.back-btn:active{opacity:.7}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.detail-name{font-size:22px;font-weight:700;color:#fff}
.detail-code{font-size:13px;color:#64748b;margin-top:2px}
.detail-price{font-size:28px;font-weight:700;color:#fff;text-align:right}
.detail-meta{font-size:12px;color:#64748b;margin-top:2px;text-align:right}

/* 大数投资信号 */
.signal-banner{text-align:center;padding:16px;border-radius:14px;border:2px solid;margin-bottom:14px;font-size:17px;font-weight:700}
.signal-banner.buy{background:#052e1644;border-color:#22c55e;color:#22c55e}
.signal-banner.hold{background:#78350f44;border-color:#f59e0b;color:#f59e0b}
.signal-banner.sell{background:#450a0a44;border-color:#ef4444;color:#ef4444}
.signal-banner.empty{background:#1e293b;border-color:#475569;color:#94a3b8}
.signal-banner .signal-label{font-size:22px;margin-bottom:4px}
.signal-banner .signal-sub{font-size:12px;font-weight:400;opacity:.8}

/* 指标格子 */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.metric{background:#0f172a;border-radius:10px;padding:12px 10px;text-align:center}
.metric-label{font-size:11px;color:#64748b;margin-bottom:4px}
.metric-value{font-size:24px;font-weight:700;margin-bottom:2px}
.metric-note{font-size:10px}
.metric-ok{color:#22c55e}.metric-fail{color:#ef4444}.metric-neutral{color:#94a3b8}

/* 52周位置 */
.week52{background:#0f172a;border-radius:10px;padding:12px 14px;margin-bottom:14px}
.week52-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.week52-title{font-size:13px;color:#64748b}
.week52-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600;color:#fff}
.week52-bar{background:#1e293b;border-radius:6px;height:12px;position:relative;overflow:hidden;margin-bottom:4px}
.week52-fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;transition:width .3s}
.week52-labels{display:flex;justify-content:space-between;font-size:10px;color:#475569;margin-top:4px}
.week52-range{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-top:2px}

.add-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.add-btn:active{opacity:.85}

/* 实践表 */
.practice-empty{text-align:center;padding:60px 20px;color:#475569}
.practice-empty .icon{font-size:48px;margin-bottom:12px}
.practice-item{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:10px}
.practice-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.practice-name{font-size:16px;font-weight:700;color:#fff}
.practice-code{font-size:12px;color:#64748b;margin-top:2px}
.practice-delete{background:none;border:none;color:#475569;cursor:pointer;font-size:18px;padding:0;line-height:1}
.practice-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.practice-grid-item{background:#0f172a;border-radius:8px;padding:8px 6px;text-align:center}
.practice-grid-label{font-size:10px;color:#64748b}
.practice-grid-value{font-size:14px;font-weight:700;color:#e2e8f0;margin-top:2px}
.practice-gain{text-align:center;font-size:14px;font-weight:600;margin-bottom:8px}
.practice-tag{font-size:11px;background:#0f172a;color:#64748b;padding:2px 8px;border-radius:6px;margin-right:6px;margin-bottom:4px;display:inline-block}
.practice-signal{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:700;text-align:center;margin-top:8px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end}
.modal{background:#1e293b;border-radius:16px 16px 0 0;padding:24px;width:100%}
.modal-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-label{font-size:13px;color:#94a3b8;margin-bottom:6px;display:block}
.modal-input{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none}
.modal-input:focus{border-color:#60a5fa}
.modal-input:disabled{color:#64748b;background:#162030}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-cancel{flex:1;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#94a3b8;font-size:15px;cursor:pointer}
.modal-confirm{flex:2;padding:12px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.footer{text-align:center;padding:12px;font-size:11px;color:#475569}

/* 空状态 */
.empty-hint{text-align:center;padding:40px 20px;color:#475569;font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:inline-block;width:14px;height:14px;border:2px solid #60a5fa;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:4px}
</style>
</head>

// 行业推荐列表（每个行业选一只代表性股票）
const INDUSTRY_RECS = [
  {code:'sh601318',name:'中国平安',industry:'保险'},
  {code:'sh600036',name:'招商银行',industry:'银行'},

  {code:'sh600519',name:'贵州茅台',industry:'白酒'},
  {code:'sh600900',name:'长江电力',industry:'电力'},
  {code:'sz000002',name:'万科A',industry:'房地产'},
  {code:'sz002594',name:'比亚迪',industry:'汽车'},
  {code:'sh600028',name:'中国石化',industry:'石油'},
  {code:'sh601857',name:'中国石油',industry:'石油'},
  {code:'sh600276',name:'恒瑞医药',industry:'医药'},
  {code:'sz000651',name:'格力电器',industry:'家电'},
  {code:'sh601012',name:'隆基绿能',industry:'新能源'},

const GBK_DECODER = new TextDecoder('gbk');

const state = {
  tab: 'search', query: '', searchResults: [], searching: false,
  viewStack: [], selectedStock: null, loadingDetail: false,
  practice: [], livePrices: {}, showAddModal: false, addForm: {},
  industryLive: {}, // 行业推荐实时价格
};

function $(s){return document.querySelector(s);}
function escHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){if(s==null)return'';return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;');}
function updatePracticeCount(){var el=$('#practice-count');if(el)el.textContent=state.practice.length?'('+state.practice.length+')':'';}
function weekPosColor(pos){if(pos==null)return'#475569';if(pos<30)return'#22c55e';if(pos>70)return'#ef4444';return'#f59e0b';}

// 大数投资信号：52周位置为核心，PE/PB为辅助条件
function calcSignal(d){
  var pos=d.week52Pos;
  if(pos==null)return{label:'数据不足',cls:'empty',icon:'⚪',sub:'52周数据缺失'};
  var peOk=d.pe!=null&&d.pe>0&&d.pe<=20;
  var pbOk=d.pb!=null&&d.pb>0&&d.pb<=2;
  if(pos<30){
    var tag='';
    if(peOk&&pbOk)tag='低估值+低价';
    else if(peOk||pbOk)(peOk?tag+='PE低 ':'')+(pbOk?tag+='PB低':'');
    else tag='价格低位';
    return{label:'建议买入',cls:'buy',icon:'🟢',sub:'52周位置'+pos+'% · '+tag};
  }
  if(pos>70){
    return{label:'建议卖出',cls:'sell',icon:'🔴',sub:'52周位置'+pos+'% · 价格高位'};
  }
  return{label:'持有',cls:'hold',icon:'🟡',sub:'52周位置'+pos+'% · 合理区间'};
}

// 腾讯行情 API
async function fetchStockDetail(code){
  var secid=code;
  if(/^\d{6}$/.test(code))secid=code.startsWith('6')?'sh'+code:'sz'+code;
  var resp=await fetch('https://qt.gtimg.cn/q='+secid,{headers:{'Referer':'https://gu.qq.com'}});
  if(!resp.ok)return{error:'网络请求失败'};
  var buf=await resp.arrayBuffer();
  var bodyStr=GBK_DECODER.decode(buf);
  var match=bodyStr.match(/="([^"]+)"/);
  if(!match)return{error:'股票未找到'};
  var f=match[1].split('~');
  if(!f[3])return{error:'数据解析失败'};
  var price=parseFloat(f[3])||0;
  var pe=parseFloat(f[39])||null;
  var pb=parseFloat(f[43])||null;
  var high52=parseFloat(f[33])||null;
  var low52=parseFloat(f[34])||null;
  var week52Pos=null;
  if(high52&&low52&&high52>low52&&price){
    week52Pos=Math.round(((price-low52)/(high52-low52))*1000)/10;
  }
  return{
    code:code,name:f[1]||code,price:price,
    pe:(pe!==null&&pe>0)?Math.round(pe*100)/100:null,
    pb:(pb!==null&&pb>0)?Math.round(pb*100)/100:null,
    high52:high52,low52:low52,week52Pos:week52Pos,
  };
}

// 批量获取行业推荐实时数据
async function refreshIndustryRecs(){
  var promises=INDUSTRY_RECS.map(function(r){
    return fetchStockDetail(r.code).then(function(d){
      if(!d.error)state.industryLive[r.code]=d;
    }).catch(function(){});
  });
  await Promise.all(promises);
}

// 实践表
function loadPractice(){try{return JSON.parse(localStorage.getItem('dashu-practice')||'[]');}catch(e){return[];}}
function savePractice(list){localStorage.setItem('dashu-practice',JSON.stringify(list));}

// 模糊搜索
function fuzzyMatch(q){
  var ql=q.toLowerCase().trim();
  if(!ql)return[];
  var results=[];
  for(var i=0;i<STOCKS.length;i++){
    var s=STOCKS[i];
    var name=s.name.toLowerCase();
    var code=s.code.toLowerCase().replace(/^(sh|sz|bj)/,'');
    if(code===ql||s.code.toLowerCase()===ql){results.push({...s,_score:100});continue;}
    if(code===ql&&ql.length>=4){results.push({...s,_score:90});continue;}
    if(name.includes(ql)){results.push({...s,_score:60});continue;}
    if(name.startsWith(ql)){results.push({...s,_score:80});continue;}
  }
  results.sort(function(a,b){return b._score-a._score;});
  return results.slice(0,15).map(function(x){var r={};for(var k in x)if(k!=='_score')r[k]=x[k];return r;});
}

// 渲染

function render(){
  $('tab-search').classList.toggle('active',state.tab==='search');
  $('tab-practice').classList.toggle('active',state.tab==='practice');
  if(state.tab==='search')renderSearch();else renderPractice();
}

function switchTab(tab){
  state.tab=tab;
  if(tab==='practice'){state.practice=loadPractice();refreshLivePrices();}
  render();

    var inp=$('#search-input');
    inp.addEventListener('input',function(e){state.query=e.target.value;handleSearchInput(state.query);});
    inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSearch();}});
    // 初始加载行业推荐数据
    if(Object.keys(state.industryLive).length===0){
      refreshIndustryRecs().then(function(){
        var sec=$('#industry-recs');
        if(sec)sec.outerHTML=renderIndustrySection();
      });
    }
  } else {
    // 详情页
    c.innerHTML=renderDetail();
  }
}

function renderIndustrySection(){
  var html='<div class="industry-section"><div class="industry-title">📊 行业推荐（按大数投资理论）</div><div class="industry-stocks" id="industry-recs">';
  for(var i=0;i<INDUSTRY_RECS.length;i++){
    var r=INDUSTRY_RECS[i];
    var live=state.industryLive[r.code]||{};
    var pos=live.week52Pos;
    var sig=calcSignal(live);
    var posBg=weekPosColor(pos);
    html+='<div class="ind-card" onclick="viewStock({code:\''+escAttr(r.code)+'\',name:\''+escAttr(r.name)+'\'})">'+
      '<div class="ind-name">'+escHtml(r.name)+'</div>'+
      '<div class="ind-code">'+escHtml(r.industry)+'</div>'+
      '<div class="ind-price">'+(live.price?'¥'+live.price:'加载中…')+'</div>'+
      '<div class="ind-signal" style="background:'+sig.cls+';color:#fff;font-size:10px;border-radius:6px">'+sig.label+'</div>'+
    '</div>';
  }
  return html+'</div></div>';
}

function handleSearchInput(val){
  var sug=$('#suggestions');
  if(!val.trim()){sug.classList.remove('show');state.searchResults=[];return;}
  var results=fuzzyMatch(val.trim());
  state.searchResults=results;
  if(results.length===0){
    sug.classList.remove('show');return;
  }
  var html='';
  for(var i=0;i<results.length;i++){
    var s=results[i];
    html+='<div class="suggestion-item" onclick="selectSuggestion(\''+escAttr(s.code)+'\',\''+escAttr(s.name)+'\')">'+
      '<div><span class="suggestion-name">'+escHtml(s.name)+'</span> <span class="suggestion-code">'+escHtml(s.code.replace(/^(sh|sz|bj)/i,''))+'</span></div>'+
      '<div style="font-size:12px;color:#64748b">'+escHtml(s.industry||'')+'</div>'+
    '</div>';
  }
  sug.innerHTML=html;sug.classList.add('show');
}

function doSearch(){
  var val=$('#search-input').value.trim();
  if(!val)return;
  state.query=val;
  state.searchResults=fuzzyMatch(val);
  $('#suggestions').classList.remove('show');
  renderSearchResults();
}

function renderSearchResults(){
  var c=$('#content');
  var html='<div class="search-wrap">'+
    '<input id="search-input" type="text" placeholder="输入代码或名称" value="'+escAttr(state.query)+'" autocomplete="off">'+
    '<button class="search-btn" onclick="doSearch()">查询</button>'+
  '</div>';
  if(state.searchResults.length===0){
    html+='<div class="empty-hint">未找到「'+escHtml(state.query)+'」，试试其他关键词</div>';
  } else {
    html+='<div class="card-list">';
    for(var i=0;i<state.searchResults.length;i++){
      var s=state.searchResults[i];
      html+='<div class="stock-item" onclick="viewStock({code:\''+escAttr(s.code)+'\',name:\''+escAttr(s.name)+'\'})">'+
        '<div><div class="name">'+escHtml(s.name)+'</div><div class="code">'+escHtml((s.code||'').replace(/^(sh|sz|bj)/i,''))+' · '+escHtml(s.industry||'')+'</div></div>'+
        '<div class="arrow">›</div></div>';
    }
    html+='</div>';
  }
  html+='<div style="margin-top:12px"><button class="back-btn" onclick="clearSearch()">← 返回行业推荐</button></div>';
  c.innerHTML=html;
  var inp=$('#search-input');
  inp.addEventListener('input',function(e){state.query=e.target.value;handleSearchInput(state.query);});
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSearch();}});
}

function clearSearch(){
  state.query='';state.searchResults=[];
  state.viewStack=[];
  render();
}

function selectSuggestion(code,name){
  $('#suggestions').classList.remove('show');
  viewStock({code:code,name:name});
}

// ---- 详情页 ----
async function viewStock(stock){
  state.viewStack.push('detail');
  state.selectedStock=stock;
  state.loadingDetail=true;
  render();
  var d=await fetchStockDetail(stock.code);
  if(!d.error){state.selectedStock={...stock,...d};state.livePrices[stock.code]=d;}
  state.loadingDetail=false;
  render();
}

function renderDetail(){
  var s=state.selectedStock;
  if(!s)return'<div style="padding:40px;text-align:center;color:#64748b"><span class="loading"></span>加载中…</div>';
  var peOk=s.pe!=null&&s.pe<=20;
  var pbOk=s.pb!=null&&s.pb<=2;
  var peVal=s.pe!=null?s.pe.toFixed(2):'—';
  var pbVal=s.pb!=null?s.pb.toFixed(2):'—';
  var sig=calcSignal(s);
  var inPractice=state.practice.some(function(p){return p.code===s.code;});
  var sigIcon='⚪';
  if(sig.cls==='buy')sigIcon='🟢';
  else if(sig.cls==='sell')sigIcon='🔴';
  else if(sig.cls==='hold')sigIcon='🟡';

  var html='<button class="back-btn" onclick="goBack()">← 返回列表</button><div class="card">';
  html+='<div class="detail-header">'+
    '<div><div class="detail-name">'+escHtml(s.name)+'</div><div class="detail-code">'+escHtml((s.code||'').replace(/^(sh|sz|bj)/i,''))+'</div></div>'+
    '<div><div class="detail-price">'+(s.price?'¥'+s.price:'—')+'</div>'+(s.pe!=null?'<div class="detail-meta">PE '+peVal+' · PB '+pbVal+'</div>':'')+'</div>'+
  '</div>';

  // 大数投资核心信号
  html+='<div class="signal-banner '+sig.cls+'">'+
    '<div class="signal-label">'+sig.icon+' '+sig.label+'</div>'+
    '<div class="signal-sub">'+sig.sub+'</div>'+
  '</div>';

  // PE/PB 指标
  var peCls=s.pe!=null?(peOk?'metric-ok':'metric-fail'):'metric-neutral';
  var pbCls=s.pb!=null?(pbOk?'metric-ok':'metric-fail'):'metric-neutral';
  html+='<div class="metric-grid">'+
    '<div class="metric">'+
      '<div class="metric-label">市盈率 PE</div>'+
      '<div class="metric-value '+peCls+'">'+peVal+'</div>'+
      '<div class="metric-note '+(s.pe!=null?(peOk?'metric-ok':'metric-fail'):'metric-neutral')+'">'+(s.pe!=null?(peOk?'✅ PE≤20 低估':'❌ PE>20'):'数据不足')+'</div>'+
    '</div>'+
    '<div class="metric">'+
      '<div class="metric-label">市净率 PB</div>'+
      '<div class="metric-value '+pbCls+'">'+pbVal+'</div>'+
      '<div class="metric-note '+(s.pb!=null?(pbOk?'metric-ok':'metric-fail'):'metric-neutral')+'">'+(s.pb!=null?(pbOk?'✅ PB≤2 低估':'❌ PB>2'):'数据不足')+'</div>'+
    '</div>'+
  '</div>';

  // 52周位置
  if(s.week52Pos!=null||(s.high52&&s.low52)){
    var pos=s.week52Pos;
    var posBg=weekPosColor(pos);
    var posLabel=pos!=null?(pos+'%'):'—';
    html+='<div class="week52">'+
      '<div class="week52-header">'+
        '<span class="week52-title">📈 52周价格位置</span>'+
        '<span class="week52-badge" style="background:'+posBg+';color:#fff">'+posLabel+'</span>'+
      '</div>'+
      '<div class="week52-bar">'+
        '<div style="position:absolute;left:30%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.3)"></div>'+
        '<div style="position:absolute;left:70%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.3)"></div>'+
        '<div class="week52-fill" style="width:'+(pos||0)+'%;background:'+posBg+'"></div>'+
      '</div>'+
      '<div class="week52-labels"><span>最低</span><span style="color:#22c55e">🟢买入&lt;30%</span><span>🟡持有</span><span style="color:#ef4444">🔴卖出&gt;70%</span><span>最高</span></div>'+
      (s.high52&&s.low52?'<div class="week52-range">52周低价 ¥'+s.low52+' &nbsp;|&nbsp; 52周高价 ¥'+s.high52+'</div>':'')+
    '</div>';
  } else {
    html+='<div class="week52"><div class="week52-title" style="color:#475569;font-size:13px;text-align:center;padding:10px">⚠️ 52周数据暂时不可用</div></div>';
  }

  // 加入实践表
  html+='<button class="add-btn" onclick="openAddModal()" '+(inPractice?'style="background:#334155;color:#94a3b8" disabled':'')+'>'+
    (inPractice?'✅ 已在实践表':'➕ 加入实践表（记录买入价和数量）')+'</button>';
  html+='</div>';
  return html;
}

function goBack(){state.viewStack.pop();state.selectedStock=null;render();}

// ---- 实践表 ----
function renderPractice(){
  var c=$('#content');
  if(state.practice.length===0){
    c.innerHTML='<div class="practice-empty"><div class="icon">📋</div><div class="title">实践表是空的</div><div class="desc">去「股票查询」找股票加入，记录买入价格</div></div>';
    return;
  }
  var html='';
  for(var i=0;i<state.practice.length;i++){
    var item=state.practice[i];
    var live=state.livePrices[item.code]||{};
    var currentPrice=live.price||item.buyPrice||0;
    var gain=item.buyPrice&&currentPrice?(((currentPrice-item.buyPrice)/item.buyPrice)*100).toFixed(2):null;
    var gainAmt=item.buyPrice&&item.shares&&currentPrice?((currentPrice-item.buyPrice)*item.shares).toFixed(0):null;
    var pos=live.week52Pos??item.week52PosAtBuy??null;
    var sig=calcSignal({week52Pos:pos});
    var gainColor=gain!=null?(parseFloat(gain)>=0?'#ef4444':'#22c55e'):'#94a3b8';
    html+='<div class="practice-item">'+
      '<div class="practice-header"><div><div class="practice-name">'+escHtml(item.name)+'</div><div class="practice-code">'+escHtml(item.code.replace(/^(sh|sz|bj)/i,''))+'</div></div>'+
      '<button class="practice-delete" onclick="removeItem(\''+escAttr(item.code)+'\')">✕</button></div>'+
      '<div class="practice-grid">'+
        '<div class="practice-grid-item"><div class="practice-grid-label">买入价</div><div class="practice-grid-value">'+(item.buyPrice?'¥'+item.buyPrice:'—')+'</div></div>'+
        '<div class="practice-grid-item"><div class="practice-grid-label">数量</div><div class="practice-grid-value">'+(item.shares?item.shares+'股':'—')+'</div></div>'+
        '<div class="practice-grid-item"><div class="practice-grid-label">当前价</div><div class="practice-grid-value">'+(live.price?'¥'+live.price:'…')+'</div></div>'+
      '</div>';
    if(gain!=null){
      html+='<div class="practice-gain" style="color:'+gainColor+'">'+(parseFloat(gain)>=0?'+':'')+gain+'% '+(gainAmt!=null?'('+(parseFloat(gain)>=0?'+':'¥')+gainAmt+')':'')+'</div>';
    }
    html+='<div>'+
      '<span class="practice-tag">PE '+(item.peAtBuy!=null?item.peAtBuy.toFixed(2):'?')+'→'+(live.pe!=null?live.pe.toFixed(2):'?')+'</span>'+
      '<span class="practice-tag">PB '+(item.pbAtBuy!=null?item.pbAtBuy.toFixed(2):'?')+'→'+(live.pb!=null?live.pb.toFixed(2):'?')+'</span>'+
    '</div>'+
    '<div class="practice-signal" style="background:'+sig.cls+';color:'+(sig.cls==='buy'?'#22c55e':sig.cls==='sell'?'#ef4444':'#f59e0b')+'">'+sig.icon+' '+sig.label+' '+(pos!=null?'52周'+pos+'%':'')+'</div>'+
    '</div>';
  }
  c.innerHTML=html+'<div class="footer">每30秒自动刷新 · 🟢买入&lt;30% · 🟡持有30-70% · 🔴卖出&gt;70%</div>';
}

async function refreshLivePrices(){
  var promises=state.practice.map(function(item){
    return fetchStockDetail(item.code).then(function(d){
      if(!d.error)state.livePrices[item.code]=d;
    }).catch(function(){});
  });
  await Promise.all(promises);
  render();
}

// ---- 弹窗 ----
function openAddModal(){
  var s=state.selectedStock;
  if(!s)return;
  state.addForm={code:s.code,name:s.name,buyPrice:s.price||'',shares:''};
  renderModal();
}
function closeModal(){
  state.showAddModal=false;
  var el=$('.modal-overlay');if(el)el.remove();
}
function renderModal(){
  var f=state.addForm;
  var html='<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'+
    '<div class="modal"><div class="modal-title">加入实践表</div>'+
    '<div class="modal-field"><label class="modal-label">股票代码</label><input class="modal-input" value="'+escAttr(f.code||'')+'" disabled></div>'+
    '<div class="modal-field"><label class="modal-label">股票名称</label><input class="modal-input" value="'+escAttr(f.name||'')+'" disabled></div>'+
    '<div class="modal-field"><label class="modal-label">买入价格（元）</label><input class="modal-input" type="number" step="0.01" placeholder="填实际买入价" value="'+escAttr(f.buyPrice||'')+'" id="modal-buyPrice"></div>'+
    '<div class="modal-field"><label class="modal-label">买入数量（股）</label><input class="modal-input" type="number" step="100" placeholder="100的整数倍" value="'+escAttr(f.shares||'')+'" id="modal-shares"></div>'+
    '<div class="modal-actions"><button class="modal-cancel" onclick="closeModal()">取消</button><button class="modal-confirm" onclick="submitAdd()">确认添加</button></div>'+
    '</div></div>';
  var existing=$('.modal-overlay');if(existing)existing.remove();
  document.body.insertAdjacentHTML('beforeend',html);
}
async function submitAdd(){
  var buyPrice=parseFloat($('#modal-buyPrice').value)||0;
  var shares=parseInt($('#modal-shares').value)||0;
  if(!buyPrice||!shares){alert('请填写买入价和数量');return;}
  var s=state.selectedStock;
  var live=state.livePrices[s.code]||{};
  var list=loadPractice();
  var idx=list.findIndex(function(p){return p.code===s.code;});
  var entry={code:s.code,name:s.name,buyPrice:buyPrice,shares:shares,
    peAtBuy:live.pe??null,pbAtBuy:live.pb??null,week52PosAtBuy:live.week52Pos??null,
    addedAt:new Date().toISOString()};
  if(idx>=0)list[idx]=entry;else list.push(entry);
  savePractice(list);
  state.practice=list;
  closeModal();render();updatePracticeCount();
}
async function removeItem(code){
  var list=loadPractice().filter(function(p){return p.code!==code;});
  savePractice(list);
  state.practice=list;
  render();updatePracticeCount();
}

// ============================================================
// Init
// ============================================================
state.practice=loadPractice();
updatePracticeCount();
render();
// 定时刷新行业推荐数据
setInterval(function(){
  if(state.tab==='search'&&state.viewStack.length===0){
    refreshIndustryRecs().then(function(){
      if(state.tab==='search'&&state.viewStack.length===0){
        var c=$('#content');
        var inpVal=$('#search-input')?$('#search-input').value:'';
        if(!inpVal)c.innerHTML='<div class="search-wrap">'+
          '<input id="search-input" type="text" placeholder="输入代码或名称" autocomplete="off">'+
          '<button class="search-btn" onclick="doSearch()">查询</button>'+
        '</div><div class="search-suggestions" id="suggestions"></div>'+
        renderIndustrySection()+
        '<div class="empty-hint">🔍 输入股票代码或名称开始搜索</div>';
        var inp=$('#search-input');
        inp.addEventListener('input',function(e){state.query=e.target.value;handleSearchInput(state.query);});
        inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSearch();}});
      }
    });
  }
},60000);
// 实践表自动刷新
setInterval(function(){if(state.tab==='practice'&&state.practice.length>0)refreshLivePrices();},30000);
</script>
